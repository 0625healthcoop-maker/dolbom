<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합돌봄 민관협력 워크숍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#0C1A14;
  --forest:#1A3328;
  --moss:#2D5A3D;
  --sage:#4A8C5C;
  --mist:#8FBF9A;
  --dew:#C8E6CD;
  --paper:#F2F7F3;
  --gold:#C9A84C;
  --gold2:#E8C96A;
  --cream:#FBF8F0;
  --white:#FFFFFF;
  --muted:#6B8C74;
}

html,body{height:100%}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
}

/* ── 입력 화면 ── */
#inputScreen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  background:var(--forest);
  position:relative;
  overflow:hidden;
}

#inputScreen::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, #2D5A3D44 0%, transparent 70%),
             radial-gradient(ellipse 40% 40% at 80% 80%, #C9A84C18 0%, transparent 60%);
  pointer-events:none;
}

.input-logo{
  font-family:'Noto Serif KR',serif;
  font-size:.7rem;
  font-weight:600;
  letter-spacing:3px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:12px;
  opacity:.9;
}

.input-title{
  font-family:'Noto Serif KR',serif;
  font-size:1.8rem;
  font-weight:700;
  color:var(--white);
  text-align:center;
  line-height:1.4;
  margin-bottom:6px;
}

.input-sub{
  font-size:.82rem;
  color:var(--mist);
  text-align:center;
  margin-bottom:36px;
  letter-spacing:.3px;
}

.input-card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(201,168,76,.25);
  border-radius:20px;
  padding:28px 24px;
  width:100%;
  max-width:480px;
  backdrop-filter:blur(8px);
}

.input-card label{
  font-size:.7rem;
  font-weight:700;
  letter-spacing:2px;
  color:var(--gold);
  text-transform:uppercase;
  display:block;
  margin-bottom:10px;
}

.event-inputs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}

.event-inputs input, .input-card input[type=text]{
  width:100%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(143,191,154,.2);
  border-radius:10px;
  padding:10px 14px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.83rem;
  color:var(--white);
  outline:none;
  transition:border-color .2s;
}

.event-inputs input::placeholder, .input-card input[type=text]::placeholder{
  color:rgba(143,191,154,.45);
}
.event-inputs input:focus, .input-card input[type=text]:focus{
  border-color:var(--gold);
}

.url-row{ margin-top:4px; }
.url-row label{ margin-top:16px; }

.hint-text{
  font-size:.72rem;
  color:var(--mist);
  margin-top:8px;
  line-height:1.7;
  opacity:.8;
}

.error-box{
  background:rgba(231,111,81,.15);
  border:1px solid rgba(231,111,81,.4);
  border-radius:8px;
  padding:10px 14px;
  color:#f4a48a;
  font-size:.78rem;
  display:none;
  margin-top:10px;
  line-height:1.6;
}

.btn-primary{
  width:100%;
  margin-top:18px;
  padding:14px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:var(--forest);
  border:none;
  border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.9rem;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.3px;
  transition:all .2s;
  box-shadow:0 4px 20px rgba(201,168,76,.35);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,168,76,.45)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* 시트 미리보기 */
.sheet-preview{ display:none; margin-top:16px; }
.sheet-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.sheet-tag{
  background:rgba(201,168,76,.15);
  border:1px solid rgba(201,168,76,.3);
  color:var(--gold2);
  font-size:.72rem;
  font-weight:700;
  padding:3px 10px;
  border-radius:20px;
}
.preview-pre{
  background:rgba(0,0,0,.2);
  border-radius:8px;
  padding:10px 12px;
  font-size:.75rem;
  color:var(--mist);
  line-height:1.7;
  max-height:100px;
  overflow-y:auto;
  white-space:pre-wrap;
}
.divider{ height:1px; background:rgba(143,191,154,.15); margin:16px 0; }

/* ── 로딩 ── */
#loadingScreen{
  display:none;
  position:fixed;inset:0;
  background:var(--forest);
  z-index:100;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
}
.loader-ring{
  width:56px;height:56px;
  border:3px solid rgba(201,168,76,.2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{
  font-family:'Noto Serif KR',serif;
  font-size:.95rem;
  color:var(--mist);
  letter-spacing:.5px;
}

/* ── 결과 화면 ── */
#resultScreen{ display:none; }

/* 헤더 */
.result-header{
  background:var(--forest);
  padding:22px 24px 18px;
  position:relative;
  overflow:hidden;
}
.result-header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.rh-eyebrow{
  font-size:.65rem;
  letter-spacing:3px;
  color:var(--gold);
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:4px;
}
.rh-title{
  font-family:'Noto Serif KR',serif;
  font-size:1.25rem;
  color:var(--white);
  font-weight:700;
}
.rh-meta{
  font-size:.75rem;
  color:var(--mist);
  margin-top:4px;
}
.rh-actions{
  position:absolute;
  right:20px;top:50%;
  transform:translateY(-50%);
  display:flex;gap:8px;
}
.btn-icon{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(201,168,76,.25);
  border-radius:8px;
  padding:7px 12px;
  color:var(--gold2);
  font-size:.72rem;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.3px;
  transition:all .15s;
}
.btn-icon:hover{background:rgba(201,168,76,.15)}

/* 탭 */
.tab-bar{
  display:flex;
  background:var(--ink);
  border-bottom:1px solid rgba(201,168,76,.12);
  padding:0 16px;
  gap:2px;
}
.tab-btn{
  padding:12px 16px;
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.5px;
  color:var(--muted);
  cursor:pointer;
  border:none;
  background:none;
  border-bottom:2px solid transparent;
  transition:all .15s;
  font-family:'Noto Sans KR',sans-serif;
}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* 패널들 */
.panel{ padding:24px 20px; display:none; }
.panel.active{ display:block; }

/* 워드클라우드 */
#wcCanvas{
  width:100%;
  height:320px;
  position:relative;
  overflow:hidden;
}
.wc-word{
  position:absolute;
  font-family:'Noto Serif KR',serif;
  font-weight:700;
  cursor:default;
  transition:opacity .2s;
  white-space:nowrap;
  transform:translate(-50%,-50%);
}
.wc-word:hover{ opacity:1!important; }

/* 방사형 마인드맵 */
#mmSvg{ width:100%; height:420px; display:block; }

/* 순위 */
.rank-list{ display:grid; gap:10px; }
.rank-item{
  display:grid;
  grid-template-columns:28px 1fr 36px;
  align-items:center;
  gap:12px;
}
.rank-num{
  font-family:'Noto Serif KR',serif;
  font-size:.8rem;
  font-weight:700;
  color:var(--gold);
  text-align:right;
}
.rank-top .rank-num{ font-size:1rem; }
.rank-info{}
.rank-word{
  font-size:.9rem;
  font-weight:700;
  color:var(--ink);
}
.rank-cat{
  font-size:.68rem;
  color:var(--muted);
  margin-top:1px;
}
.rank-bar-wrap{
  height:4px;
  background:var(--dew);
  border-radius:2px;
  margin-top:4px;
  overflow:hidden;
}
.rank-bar-fill{
  height:100%;
  border-radius:2px;
  background:linear-gradient(90deg,var(--moss),var(--gold));
  animation:grow .7s ease-out both;
}
@keyframes grow{from{width:0}}
.rank-score{
  font-size:.8rem;
  font-weight:700;
  color:var(--muted);
  text-align:right;
}

/* 요약 카드 */
.summary-card{
  background:var(--forest);
  border-radius:16px;
  padding:22px 20px;
  margin:8px 20px 20px;
  position:relative;
  overflow:hidden;
}
.summary-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),transparent);
}
.summary-eyebrow{
  font-size:.65rem;
  letter-spacing:2.5px;
  color:var(--gold);
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:10px;
}
.summary-text{
  font-family:'Noto Serif KR',serif;
  font-size:.92rem;
  color:rgba(255,255,255,.88);
  line-height:1.85;
}
.summary-stat-row{
  display:flex;gap:20px;
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid rgba(201,168,76,.15);
}
.stat-item{ text-align:center; flex:1; }
.stat-num{
  font-family:'Noto Serif KR',serif;
  font-size:1.4rem;
  font-weight:700;
  color:var(--gold2);
}
.stat-label{ font-size:.65rem; color:var(--mist); margin-top:2px; letter-spacing:.5px; }

/* 원문 */
.raw-section{
  padding:0 20px 24px;
}
.raw-toggle{
  font-size:.72rem;
  color:var(--muted);
  font-weight:700;
  cursor:pointer;
  letter-spacing:.5px;
  padding:8px 0;
  display:inline-block;
  text-decoration:underline;
  text-underline-offset:3px;
}
.raw-grid{ display:grid; gap:10px; margin-top:10px; }
.raw-block{
  background:var(--paper);
  border-radius:10px;
  padding:14px;
  border-left:3px solid var(--sage);
}
.raw-title{ font-size:.72rem; font-weight:700; color:var(--moss); margin-bottom:5px; letter-spacing:.5px; }
.raw-body{ font-size:.75rem; color:var(--muted); line-height:1.7; white-space:pre-wrap; }

/* 풀스크린 */
:fullscreen #resultScreen{ overflow-y:auto; background:var(--paper); }

.hidden{display:none!important}
</style>
</head>
<body>

<!-- ── 입력 화면 ── -->
<div id="inputScreen">
  <div class="input-logo">통합돌봄 민관협력 워크숍</div>
  <div class="input-title">우리 지역의 목소리를<br>하나로 모읍니다</div>
  <div class="input-sub">테이블별 토의 내용을 실시간으로 수집·분석·시각화</div>

  <div class="input-card">
    <label>행사 정보</label>
    <div class="event-inputs">
      <input type="text" id="eventTitle" placeholder="행사명 (예: 노원구 통합돌봄 포럼)" />
      <input type="text" id="eventDate" placeholder="날짜 (예: 2025.06.20)" />
    </div>

    <div class="divider"></div>

    <label>토의 내용 붙여넣기</label>
    <textarea id="pasteText" placeholder="구글시트 전체 선택(Ctrl+A) → 복사(Ctrl+C) → 여기에 붙여넣기(Ctrl+V)&#10;&#10;형식 상관없이 그냥 붙여넣으세요. 테이블 구분이 있어도 없어도 됩니다." style="width:100%;min-height:140px;background:rgba(255,255,255,.08);border:1px solid rgba(143,191,154,.2);border-radius:10px;padding:12px 14px;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;color:#fff;outline:none;resize:vertical;line-height:1.7;margin-top:2px"></textarea>
    <p class="hint-text" style="margin-top:7px">
      📋 구글시트에서 <strong style="color:var(--gold2)">Ctrl+A → Ctrl+C</strong> 전체 복사 후 위에 붙여넣기<br>
      ✏️ 직접 타이핑해도 됩니다 — 형식 무관
    </p>

    <div class="error-box" id="errorBox"></div>

    <button class="btn-primary" id="mainBtn" onclick="onMainBtn()">✨ AI 분석 + 시각화 시작</button>
  </div>
</div>

<!-- ── 로딩 ── -->
<div id="loadingScreen" style="display:none;position:fixed;inset:0;background:var(--forest);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div class="loader-ring"></div>
  <div class="loader-msg" id="loaderMsg">데이터를 불러오는 중…</div>
</div>

<!-- ── 결과 화면 ── -->
<div id="resultScreen">
  <div class="result-header">
    <div class="rh-eyebrow">WORKSHOP RESULTS</div>
    <div class="rh-title" id="rhTitle">통합돌봄 민관협력 워크숍</div>
    <div class="rh-meta" id="rhMeta"></div>
    <div class="rh-actions">
      <button class="btn-icon" onclick="toggleFullscreen()">⛶ 전체화면</button>
      <button class="btn-icon" onclick="goBack()">← 다시</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">☁ 워드클라우드</button>
    <button class="tab-btn" onclick="switchTab(1)">◎ 마인드맵</button>
    <button class="tab-btn" onclick="switchTab(2)">≡ 키워드 순위</button>
  </div>

  <!-- 워드클라우드 -->
  <div class="panel active" id="panel0">
    <div id="wcCanvas"></div>
  </div>

  <!-- 마인드맵 -->
  <div class="panel" id="panel1">
    <svg id="mmSvg"></svg>
  </div>

  <!-- 순위 -->
  <div class="panel" id="panel2">
    <div class="rank-list" id="rankList"></div>
  </div>

  <!-- 요약 -->
  <div class="summary-card" id="summaryCard">
    <div class="summary-eyebrow">전체 토의 요약</div>
    <div class="summary-text" id="summaryText"></div>
    <div class="summary-stat-row" id="statRow"></div>
  </div>

  <!-- 원문 -->
  <div class="raw-section">
    <span class="raw-toggle" onclick="toggleRaw()">테이블별 원문 보기 ▾</span>
    <div class="raw-grid hidden" id="rawGrid"></div>
  </div>
</div>

<script>
let rawSheets = [];
let analysisData = null;

async function onMainBtn(){
  const text = document.getElementById('pasteText').value.trim();
  if(!text || text.length < 10){ showErr('내용을 붙여넣어 주세요.'); return; }
  hideErr();
  // 탭 구분 파싱 시도 (없으면 전체를 하나로)
  rawSheets = parseSheets(text);
  await doAnalyze();
}

function parseSheets(text){
  // [탭이름] 또는 줄 전체가 짧은 헤더면 구분
  const lines = text.split('\n');
  const sections = [];
  let current = { name: '전체', lines: [] };
  for(const line of lines){
    const m = line.match(/^\[?([가-힣\w\s··]+)\]?\s*$/);
    if(m && line.trim().length < 20 && line.trim().length > 1){
      if(current.lines.length > 0) sections.push(current);
      current = { name: m[1].trim(), lines: [] };
    } else {
      if(line.trim()) current.lines.push(line.trim());
    }
  }
  if(current.lines.length > 0) sections.push(current);
  return sections.length > 0 ? sections.map(s=>({name:s.name, text:s.lines.join('\n')}))
                              : [{name:'전체', text}];
}

async function doAnalyze(){
  showLoading('AI가 키워드를 분석하는 중…');
  document.getElementById('mainBtn').disabled=true;
  const combined = rawSheets.map(s=>`[${s.name}]\n${s.text}`).join('\n\n');
  const prompt=`당신은 지역사회 통합돌봄 분야 전문가입니다. 아래는 민관협력 워크숍 테이블별 토의 내용입니다.

${combined}

순수 JSON만 출력하세요 (마크다운 없이).

{
  "keywords":[{"word":"키워드","count":중요도1~10,"category":"카테고리"}],
  "clusters":[{"name":"클러스터명","emoji":"이모지","words":["k1","k2","k3"]}],
  "summary":"핵심 요약 2~3문장. 가장 중요한 의제와 방향.",
  "tableCount":${rawSheets.length},
  "topIssue":"가장 핵심 이슈 한 문장"
}

규칙: keywords 15~25개(유사어 통합·한국어만), count는 빈도+중요도 1~10, category는 인프라/인력/정책/서비스/대상자/재정/협력/기타 중 선택, clusters 4~5개`;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error?.message||'분석 실패');
    const raw = data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    analysisData = JSON.parse(raw);

    // 행사 정보 세팅
    const title = document.getElementById('eventTitle').value.trim() || '통합돌봄 민관협력 워크숍';
    const date = document.getElementById('eventDate').value.trim();
    document.getElementById('rhTitle').textContent = title;
    document.getElementById('rhMeta').textContent = [date, `${rawSheets.length}개 테이블`, `${analysisData.keywords.length}개 키워드 도출`].filter(Boolean).join('  ·  ');

    renderWordCloud(analysisData.keywords);
    renderMindMap(analysisData.clusters, analysisData.keywords);
    renderRank(analysisData.keywords);
    renderSummary(analysisData);
    renderRaw();

    document.getElementById('inputScreen').style.display='none';
    document.getElementById('resultScreen').style.display='block';
  }catch(e){
    showErr('분석 오류: '+e.message);
  }finally{
    hideLoading();
    document.getElementById('mainBtn').disabled=false;
  }
}

// ── 워드클라우드 (원형 배치) ──
function renderWordCloud(keywords){
  const canvas = document.getElementById('wcCanvas');
  canvas.innerHTML='';
  const sorted = [...keywords].sort((a,b)=>b.count-a.count);
  const max = sorted[0]?.count||10;
  const W = canvas.offsetWidth||360;
  const H = 320;
  const placed = [];

  const palette = [
    '#1A3328','#2D5A3D','#4A8C5C','#6BAF7A',
    '#8FBF9A','#C9A84C','#E8C96A','#A07830'
  ];

  sorted.forEach((kw,i)=>{
    const ratio = kw.count/max;
    const size = 13 + ratio*26;
    const color = palette[i%palette.length];
    const opacity = 0.55 + ratio*0.45;

    // 나선 배치
    let x,y,tries=0;
    const cx=W/2, cy=H/2;
    let angle=0, r=0;
    do{
      angle += 0.4;
      r += 0.7;
      x = cx + r*Math.cos(angle);
      y = cy + r*Math.sin(angle)*0.65;
      tries++;
    }while(tries<200 && !fits(x,y,size*kw.word.length*0.55,size*1.4,placed,W,H));

    placed.push({x,y,w:size*kw.word.length*0.6,h:size*1.4});

    const el = document.createElement('span');
    el.className='wc-word';
    el.textContent=kw.word;
    el.title=`${kw.category} · 중요도 ${kw.count}`;
    el.style.cssText=`left:${x}px;top:${y}px;font-size:${size}px;color:${color};opacity:${opacity}`;
    canvas.appendChild(el);
  });
}

function fits(x,y,w,h,placed,W,H){
  if(x-w/2<4||x+w/2>W-4||y-h/2<4||y+h/2>H-4) return false;
  for(const p of placed){
    if(Math.abs(x-p.x)<(w+p.w)/2+6 && Math.abs(y-p.y)<(h+p.h)/2+4) return false;
  }
  return true;
}

// ── 방사형 마인드맵 ──
function renderMindMap(clusters, keywords){
  const svg = document.getElementById('mmSvg');
  const W = svg.clientWidth||360;
  const H = 420;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML='';

  const km={};
  keywords.forEach(k=>{km[k.word]=k.count});
  const max = Math.max(...keywords.map(k=>k.count));

  const cx=W/2, cy=H/2;
  const r1=80; // 클러스터까지 거리
  const colors=['#2D5A3D','#4A8C5C','#C9A84C','#1A3328','#6BAF7A'];

  // 중심 노드
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<radialGradient id="cg"><stop offset="0%" stop-color="#4A8C5C"/><stop offset="100%" stop-color="#1A3328"/></radialGradient>`;
  svg.appendChild(defs);

  const cCircle=el('circle',{cx,cy,r:44,fill:'url(#cg)',stroke:'#C9A84C',strokeWidth:1.5});
  svg.appendChild(cCircle);
  const cText=el('text',{x:cx,y:cy-4,textAnchor:'middle',fill:'#fff',fontSize:13,fontFamily:'Noto Serif KR,serif',fontWeight:700});
  cText.textContent='통합돌봄';
  svg.appendChild(cText);
  const cText2=el('text',{x:cx,y:cy+12,textAnchor:'middle',fill:'#C9A84C',fontSize:10,fontFamily:'Noto Sans KR,sans-serif'});
  cText2.textContent='민관협력';
  svg.appendChild(cText2);

  clusters.forEach((cluster,ci)=>{
    const angle = (ci/clusters.length)*Math.PI*2 - Math.PI/2;
    const bx = cx + r1*Math.cos(angle);
    const by = cy + r1*Math.sin(angle);
    const col = colors[ci%colors.length];

    // 연결선 (중심→클러스터)
    const line=el('line',{x1:cx,y1:cy,x2:bx,y2:by,stroke:col,strokeWidth:1.5,opacity:.5});
    svg.appendChild(line);

    // 클러스터 노드
    const cnode=el('circle',{cx:bx,cy:by,r:30,fill:col,opacity:.95});
    svg.appendChild(cnode);
    const et=el('text',{x:bx,y:by-3,textAnchor:'middle',fill:'#fff',fontSize:9.5,fontFamily:'Noto Sans KR,sans-serif',fontWeight:700});
    et.textContent=cluster.emoji+' '+cluster.name;
    svg.appendChild(et);

    // 키워드 노드
    const kws = cluster.words.slice(0,5);
    kws.forEach((word,ki)=>{
      const spread = (ki-(kws.length-1)/2)*38;
      const perp = {x:Math.cos(angle+Math.PI/2)*spread, y:Math.sin(angle+Math.PI/2)*spread};
      const push = 72 + (km[word]||1)/max*20;
      const kx = bx + Math.cos(angle)*push + perp.x;
      const ky = by + Math.sin(angle)*push + perp.y;

      const kline=el('line',{x1:bx,y1:by,x2:kx,y2:ky,stroke:col,strokeWidth:1,opacity:.3});
      svg.appendChild(kline);

      const kr = 14 + (km[word]||1)/max*8;
      const kc=el('circle',{cx:kx,cy:ky,r:kr,fill:'#fff',stroke:col,strokeWidth:1.5});
      svg.appendChild(kc);
      const kt=el('text',{x:kx,y:ky+4,textAnchor:'middle',fill:col,fontSize:9,fontFamily:'Noto Sans KR,sans-serif',fontWeight:700});
      kt.textContent=word;
      svg.appendChild(kt);
    });
  });
}

function el(tag,attrs){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs)){
    const attr=k.replace(/([A-Z])/g,m=>'-'+m.toLowerCase());
    e.setAttribute(attr,v);
  }
  return e;
}

// ── 순위 ──
function renderRank(keywords){
  const sorted=[...keywords].sort((a,b)=>b.count-a.count).slice(0,15);
  const max=sorted[0]?.count||10;
  document.getElementById('rankList').innerHTML=sorted.map((kw,i)=>`
    <div class="rank-item ${i<3?'rank-top':''}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-info">
        <div class="rank-word">${kw.word}</div>
        <div class="rank-cat">${kw.category}</div>
        <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${(kw.count/max*100).toFixed(0)}%;animation-delay:${i*.05}s"></div></div>
      </div>
      <div class="rank-score">${kw.count}</div>
    </div>`).join('');
}

// ── 요약 ──
function renderSummary(data){
  document.getElementById('summaryText').textContent = data.summary;
  const kws = data.keywords||[];
  const cats = [...new Set(kws.map(k=>k.category))];
  document.getElementById('statRow').innerHTML=`
    <div class="stat-item"><div class="stat-num">${rawSheets.length}</div><div class="stat-label">참여 테이블</div></div>
    <div class="stat-item"><div class="stat-num">${kws.length}</div><div class="stat-label">도출 키워드</div></div>
    <div class="stat-item"><div class="stat-num">${cats.length}</div><div class="stat-label">의제 영역</div></div>
  `;
}

// ── 원문 ──
function renderRaw(){
  document.getElementById('rawGrid').innerHTML=rawSheets.map(s=>`
    <div class="raw-block">
      <div class="raw-title">📋 ${s.name}</div>
      <div class="raw-body">${s.text}</div>
    </div>`).join('');
}

function toggleRaw(){
  document.getElementById('rawGrid').classList.toggle('hidden');
}

// ── 탭 ──
function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  if(idx===0) setTimeout(()=>renderWordCloud(analysisData.keywords),50);
  if(idx===1) setTimeout(()=>renderMindMap(analysisData.clusters,analysisData.keywords),50);
}

// ── 유틸 ──
function showLoading(msg){
  document.getElementById('loaderMsg').textContent=msg;
  document.getElementById('loadingScreen').style.display='flex';
}
function hideLoading(){document.getElementById('loadingScreen').style.display='none'}
function showErr(msg){const b=document.getElementById('errorBox');b.textContent=msg;b.style.display='block'}
function hideErr(){document.getElementById('errorBox').style.display='none'}
function goBack(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('inputScreen').style.display='flex';
  document.getElementById('pasteText').value='';
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.getElementById('resultScreen').requestFullscreen();
  else document.exitFullscreen();
}
