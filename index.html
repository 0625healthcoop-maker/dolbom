<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합돌봄 민관협력 워크숍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#1A3328;--moss:#2D5A3D;--sage:#4A8C5C;
  --mist:#8FBF9A;--dew:#C8E6CD;--paper:#F2F7F3;
  --gold:#C9A84C;--gold2:#E8C96A;--white:#fff;
  --muted:#6B8C74;--ink:#0C1A14;--border:#D8E8DC;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}

/* 입력 */
#inputScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:var(--forest)}
.logo{font-size:.7rem;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.main-title{font-family:'Noto Serif KR',serif;font-size:1.7rem;font-weight:700;color:#fff;text-align:center;line-height:1.4;margin-bottom:6px}
.main-sub{font-size:.82rem;color:var(--mist);text-align:center;margin-bottom:28px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:24px;width:100%;max-width:540px}
.card label{font-size:.7rem;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:7px}
.ev-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.card input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(143,191,154,.2);border-radius:10px;padding:10px 14px;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;color:#fff;outline:none}
.card input::placeholder{color:rgba(143,191,154,.4)}
.divider{height:1px;background:rgba(143,191,154,.15);margin:14px 0}
.card textarea{width:100%;min-height:160px;background:rgba(255,255,255,.08);border:1px solid rgba(143,191,154,.2);border-radius:10px;padding:12px 14px;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;color:#fff;outline:none;resize:vertical;line-height:1.7}
.card textarea::placeholder{color:rgba(143,191,154,.4)}
.hint{font-size:.72rem;color:var(--mist);margin-top:7px;line-height:1.8;opacity:.85}
.hint strong{color:var(--gold2)}
.btn-go{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--forest);border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-go:hover{opacity:.9}
.err{background:rgba(231,111,81,.15);border:1px solid rgba(231,111,81,.4);border-radius:8px;padding:10px 14px;color:#f4a48a;font-size:.78rem;display:none;margin-top:8px}

/* 결과 */
#resultScreen{display:none}
.rh{background:var(--forest);padding:18px 20px 14px;position:relative}
.rh::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.rh-eye{font-size:.65rem;letter-spacing:2.5px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.rh-title{font-family:'Noto Serif KR',serif;font-size:1.15rem;color:#fff;font-weight:700}
.rh-meta{font-size:.72rem;color:var(--mist);margin-top:3px}
.rh-btns{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.btn-sm{background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:6px 11px;color:var(--gold2);font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 탭 */
.level-bar{display:flex;background:var(--ink);border-bottom:1px solid rgba(201,168,76,.1);padding:0 12px;overflow-x:auto}
.level-btn{padding:11px 13px;font-size:.73rem;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;flex-shrink:0}
.level-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.level-sep{width:1px;background:rgba(255,255,255,.08);margin:8px 4px;flex-shrink:0}

.panel{padding:16px;display:none}
.panel.on{display:block}
.p-label{font-size:.72rem;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}

/* 워드클라우드 캔버스 */
.wc-wrap{background:#fff;border-radius:16px;border:1px solid var(--border);position:relative;overflow:hidden;min-height:340px}
.wc-canvas{width:100%;height:340px;position:relative}
.wc-word{
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:default;
  font-family:'Noto Sans KR',sans-serif;
  font-weight:900;
  white-space:nowrap;
  transition:opacity .2s, transform .2s;
  line-height:1;
}
.wc-word:hover{opacity:1!important;transform:translate(-50%,-50%) scale(1.12)!important;z-index:10}

/* 범례 */
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* 순위 */
.rank-box{background:#fff;border-radius:14px;padding:14px 18px;border:1px solid var(--border)}
.ri{display:grid;grid-template-columns:24px 1fr 32px;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rn{font-size:.7rem;color:var(--muted);font-weight:700;text-align:right}
.rw{font-size:.85rem;font-weight:700;color:var(--ink)}
.rc{font-size:.68rem;padding:1px 6px;border-radius:10px;margin-left:4px}
.bar-bg{height:4px;background:var(--dew);border-radius:2px;margin-top:3px}
.bar-f{height:100%;border-radius:2px}
.rs{font-size:.78rem;font-weight:700;color:var(--muted);text-align:right}

/* 기관별 서브카드 */
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.sub-card{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid var(--border)}
.sub-title{font-size:.75rem;font-weight:700;color:var(--moss);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sub-tags{display:flex;flex-wrap:wrap;gap:4px}
.sub-tag{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:12px}

/* 요약 */
.sum-card{background:var(--forest);border-radius:14px;padding:18px 20px;margin:8px 16px 16px;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2),transparent)}
.sum-eye{font-size:.65rem;letter-spacing:2px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:7px}
.sum-txt{font-family:'Noto Serif KR',serif;font-size:.88rem;color:rgba(255,255,255,.88);line-height:1.85}
.stat-row{display:flex;gap:12px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(201,168,76,.15)}
.stat{flex:1;text-align:center}
.stat-n{font-family:'Noto Serif KR',serif;font-size:1.35rem;font-weight:700;color:var(--gold2)}
.stat-l{font-size:.63rem;color:var(--mist);margin-top:2px}

/* 모달 */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(10,20,15,.92);
  align-items:center;justify-content:center;
  padding:20px;
}
.modal-overlay.on{display:flex}
.modal-box{
  background:#fff;border-radius:20px;
  width:100%;max-width:900px;max-height:92vh;
  overflow-y:auto;
  position:relative;
  padding:28px 28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;padding-bottom:14px;
  border-bottom:2px solid var(--gold);
}
.modal-header-title{
  font-family:'Noto Serif KR',serif;
  font-size:1.1rem;font-weight:700;color:var(--forest);
}
.modal-close{
  background:var(--forest);color:var(--gold2);
  border:none;border-radius:8px;
  padding:7px 14px;font-size:.8rem;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}
.modal-content{}
.click-hint{
  font-size:.68rem;color:var(--muted);
  text-align:right;margin-top:6px;
  cursor:pointer;
}
.click-hint:hover{color:var(--moss)}
.wc-wrap-clickable{cursor:zoom-in}
.wc-wrap-clickable:hover::after{
  content:'🔍 클릭하면 크게 볼 수 있어요';
  position:absolute;bottom:8px;right:10px;
  font-size:.68rem;color:var(--muted);
  background:rgba(255,255,255,.9);
  padding:3px 8px;border-radius:6px;
}
</style>
</head>
<body>

<div id="inputScreen">
  <div class="logo">통합돌봄 민관협력 워크숍</div>
  <div class="main-title">우리 지역의 목소리를<br>하나로 모읍니다</div>
  <div class="main-sub">구글시트 한 번 복붙 → 테이블별·기관별·전체 자동 분석</div>
  <div class="card">
    <label>행사 정보</label>
    <div class="ev-row">
      <input type="text" id="evTitle" placeholder="행사명">
      <input type="text" id="evDate" placeholder="날짜">
    </div>
    <div class="divider"></div>
    <label>구글시트 전체 붙여넣기</label>
    <textarea id="pasteBox" placeholder="구글시트 ★통합 탭에서 Ctrl+A → Ctrl+C 후 여기에 Ctrl+V

A열: 테이블명 (구청1, 구청2, 보건소1...)
D열: 의견·키워드"></textarea>
    <p class="hint">📋 <strong>★통합 탭</strong> 전체 복사 후 붙여넣기 — 한 번만!</p>
    <div class="err" id="errBox"></div>
    <button class="btn-go" onclick="analyze()">키워드 추출 + 시각화</button>
  </div>
</div>

<div id="resultScreen">
  <div class="rh">
    <div class="rh-eye">WORKSHOP RESULTS</div>
    <div class="rh-title" id="rhTitle">통합돌봄 민관협력 워크숍</div>
    <div class="rh-meta" id="rhMeta"></div>
    <div class="rh-btns">
      <button class="btn-sm" onclick="toggleFS()">⛶ 전체화면</button>
      <button class="btn-sm" onclick="goBack()">← 다시</button>
    </div>
  </div>
  <div class="level-bar" id="levelBar"></div>
  <div id="panels"></div>
  <div class="sum-card">
    <div class="sum-eye">전체 요약</div>
    <div class="sum-txt" id="sumTxt"></div>
    <div class="stat-row" id="statRow"></div>
  </div>
</div>


<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div class="modal-header-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕ 닫기</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
// 주제별 색상 팔레트
const THEMES = {
  '인력': {bg:'#1A3328', fg:'#C8E6CD'},
  '예산·재정': {bg:'#C9A84C', fg:'#1A3328'},
  '연계·협력': {bg:'#2D5A3D', fg:'#E8C96A'},
  '서비스': {bg:'#4A8C5C', fg:'#fff'},
  '인프라': {bg:'#6BAF7A', fg:'#fff'},
  '대상자': {bg:'#8FBF9A', fg:'#1A3328'},
  '정책·제도': {bg:'#40916C', fg:'#fff'},
  '기타': {bg:'#B7E4C7', fg:'#1A3328'},
};

// 키워드→주제 분류
const THEME_MAP = {
  '인력':['인력','간호사','요양보호사','종사자','담당자','사회복지사','치료사','의사','코디네이터'],
  '예산·재정':['예산','재정','수가','비용','급여','부담금','지원금','칸막이'],
  '연계·협력':['연계','협력','연결','창구','네트워크','회의','공유','정보','의뢰','통합'],
  '서비스':['서비스','돌봄','방문','재활','간호','교육','상담','관리','지원','프로그램'],
  '인프라':['시스템','DB','자원','인프라','플랫폼','맵','목록','체계'],
  '대상자':['어르신','독거','치매','장애','이주민','외국인','수급자','환자','당사자'],
  '정책·제도':['정책','제도','법','기준','역할','지위','공식','허브','칸막이'],
};

function classifyWord(word){
  for(const [theme, keywords] of Object.entries(THEME_MAP)){
    if(keywords.some(k => word.includes(k))) return theme;
  }
  return '기타';
}

const STOP = new Set(['있어','없어','너무','정말','그냥','이게','이거','거기','이렇게','저렇게',
  '합니다','있습니다','없습니다','됩니다','해야','해서','하고','하는','하면','하지','하기',
  '그리고','그런데','그래서','하지만','때문에','위해서','위한','대한','관련','통해','따라',
  '이런','저런','어떤','같은','다른','많은','적은','필요','현재','현장','지금','아직',
  '안됨','안되','못함','못해','안해','있음','없음','됨','함','함께','모두','전체','각각',
  '및','등','이','가','을','를','은','는','에','의','와','과','도','만','로','으로',
  '에서','에게','부터','까지','대해','입니다','이다','했다','한다','된다','이름','역할',
  '소속','선택','입력','의견','키워드','자유','통합돌봄','민관협력','워크숍','수집',
  '재가','병원','복지관','당사자','보호자','테이블','구분','행정','보건','안내']);

function tokenize(text){
  return text.replace(/\t/g,' ')
    .split(/[\n,，、·\.\!\?\;\:\(\)\[\]\{\}\"\'\/\\]+/)
    .flatMap(s=>s.split(/\s+/))
    .map(w=>w.trim().replace(/^[·\-\*\#\d]+/,'').trim())
    .filter(w=>w.length>=2 && !STOP.has(w) && !/^\d+$/.test(w));
}

function countWords(tokens){
  const m={};
  tokens.forEach(w=>{m[w]=(m[w]||0)+1});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function parseRows(text){
  const rows=[];
  const lines=text.split('\n');
  for(const line of lines){
    if(!line.trim()) continue;
    const cells=line.split('\t');
    const tableCol=cells[0]?.trim();
    const opinionCol=cells[3]?.trim()||cells[2]?.trim()||cells[1]?.trim()||'';
    if(tableCol && opinionCol && tableCol.length<=15 && !/^이름|^역할|^소속|^의견|^키워드|^테이블/.test(tableCol) && !/^[A-Z]/.test(tableCol)){
      rows.push({table:tableCol, opinion:opinionCol});
    }
  }
  return rows;
}

function getGroup(t){ return t.replace(/\s*\d+$/,'').trim(); }

let panelCount=0;

function analyze(){
  const text=document.getElementById('pasteBox').value.trim();
  if(text.length<10){showErr('내용을 붙여넣어 주세요.');return;}
  hideErr();

  const rows=parseRows(text);
  if(rows.length===0){showErr('A열에 테이블명(구청1, 보건소1...)이 있는지 확인해주세요.');return;}

  const tableMap={}, groupMap={}, allTokens=[];
  rows.forEach(r=>{
    const t=r.table, g=getGroup(t);
    const tokens=tokenize(r.opinion);
    if(!tableMap[t]) tableMap[t]={group:g,tokens:[]};
    tableMap[t].tokens.push(...tokens);
    if(!groupMap[g]) groupMap[g]=[];
    groupMap[g].push(...tokens);
    allTokens.push(...tokens);
  });

  const tables=Object.keys(tableMap);
  const groups=Object.keys(groupMap);

  const title=document.getElementById('evTitle').value.trim()||'통합돌봄 민관협력 워크숍';
  const date=document.getElementById('evDate').value.trim();
  document.getElementById('rhTitle').textContent=title;
  document.getElementById('rhMeta').textContent=[date,tables.length+'개 테이블',groups.length+'개 기관'].filter(Boolean).join('  ·  ');

  const levelBar=document.getElementById('levelBar');
  const panels=document.getElementById('panels');
  levelBar.innerHTML=''; panels.innerHTML=''; panelCount=0;

  // 탭 정의
  addTab(levelBar, panels, '🌐 전체 통합', ()=>buildWC(allTokens,'전체 통합 워드클라우드'));
  addTab(levelBar, panels, '≡ 전체 순위', ()=>buildRank(allTokens));
  addTab(levelBar, panels, '🎯 공통 키워드', ()=>buildCommon(groupMap, groups));
  addTab(levelBar, panels, '📡 기관별 비교', ()=>buildRadar(groupMap, groups));

  const sep1=document.createElement('div'); sep1.className='level-sep'; levelBar.appendChild(sep1);

  groups.forEach(g=>{
    const subTables=tables.filter(t=>getGroup(t)===g).map(t=>({name:t,tokens:tableMap[t].tokens}));
    addTab(levelBar, panels, '📂 '+g, ()=>buildGroupPanel(groupMap[g], g, subTables));
  });

  const sep2=document.createElement('div'); sep2.className='level-sep'; levelBar.appendChild(sep2);

  tables.forEach(t=>{
    addTab(levelBar, panels, '📋 '+t, ()=>buildWC(tableMap[t].tokens, t));
  });

  // 요약
  const top5=countWords(allTokens).slice(0,5).map(w=>w[0]).join(', ');
  document.getElementById('sumTxt').textContent=
    `이번 워크숍에서 가장 많이 언급된 키워드는 ${top5} 등입니다. ${groups.length}개 기관 ${tables.length}개 테이블에서 의견이 수집되었습니다.`;
  document.getElementById('statRow').innerHTML=`
    <div class="stat"><div class="stat-n">${tables.length}</div><div class="stat-l">참여 테이블</div></div>
    <div class="stat"><div class="stat-n">${groups.length}</div><div class="stat-l">기관 유형</div></div>
    <div class="stat"><div class="stat-n">${countWords(allTokens).length}</div><div class="stat-l">핵심 키워드</div></div>`;

  document.getElementById('inputScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';

  // 첫 탭 렌더
  renderPanel(0);
}

function addTab(levelBar, panels, label, renderFn){
  const idx=panelCount++;
  const btn=document.createElement('button');
  btn.className='level-btn'+(idx===0?' on':'');
  btn.textContent=label;
  btn.onclick=()=>switchTab(idx);
  levelBar.appendChild(btn);

  const panel=document.createElement('div');
  panel.className='panel'+(idx===0?' on':'');
  panel.id='panel'+idx;
  panel.dataset.renderFn=''; // lazy
  panel._renderFn=renderFn;
  panels.appendChild(panel);
}

function renderPanel(idx){
  const panel=document.getElementById('panel'+idx);
  if(panel && panel._renderFn && !panel._rendered){
    panel.innerHTML=panel._renderFn();
    panel._rendered=true;
    // WC 배치
    const canvas=panel.querySelector('.wc-canvas');
    if(canvas) layoutWC(canvas);
  }
}

function switchTab(idx){
  document.querySelectorAll('.level-btn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===idx));
  renderPanel(idx);
}

// ── 워드클라우드 ──
function buildWC(tokens, title){
  const counts=countWords(tokens).slice(0,40);
  const max=counts[0]?.[1]||1;
  const words=counts.map((w,i)=>{
    const theme=classifyWord(w[0]);
    const col=THEMES[theme]||THEMES['기타'];
    const ratio=w[1]/max;
    const size=Math.round(12+ratio*28);
    const rot=[-15,-8,0,0,0,8,15][i%7];
    return `<span class="wc-word" data-size="${size}" data-rot="${rot}"
      style="font-size:${size}px;color:${col.bg};opacity:${(0.55+ratio*0.45).toFixed(2)};transform:translate(-50%,-50%) rotate(${rot}deg)"
      title="${theme} · ${w[1]}회">${w[0]}</span>`;
  }).join('');

  const legendHtml=Object.entries(THEMES).map(([name,col])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${col.bg}"></div>${name}</div>`
  ).join('');

  const wcId='wc_'+Math.random().toString(36).slice(2);
  const modalWcHtml=`<div class="wc-wrap" style="min-height:460px"><div class="wc-canvas" style="height:460px">${words}</div></div><div class="legend">${legendHtml}</div>`;
  return `<div class="p-label">${title} · 크기 = 언급 빈도 · 색깔 = 주제 분류</div>
    <div class="wc-wrap wc-wrap-clickable" onclick="openModal('${title}', \`${modalWcHtml.replace(/`/g,'\`')}\`)" style="position:relative">
      <div class="wc-canvas">${words}</div>
    </div>
    <div class="legend">${legendHtml}</div>
    <div class="click-hint" onclick="openModal('${title}', \`${modalWcHtml.replace(/`/g,'\`')}\`)">🔍 클릭해서 크게 보기</div>`;
}

function layoutWC(canvas){
  const words=[...canvas.querySelectorAll('.wc-word')];
  const W=canvas.offsetWidth||360;
  const H=canvas.offsetHeight||340;
  const placed=[];
  const cx=W/2, cy=H/2;

  words.forEach(el=>{
    const size=parseInt(el.dataset.size);
    const rot=parseInt(el.dataset.rot);
    const rad=rot*Math.PI/180;
    const w=el.offsetWidth||size*el.textContent.length*0.6;
    const h=el.offsetHeight||size*1.3;

    let x,y,tries=0;
    let angle=Math.random()*Math.PI*2;
    let r=0;
    do{
      angle+=0.45;
      r+=1.2;
      x=cx+r*Math.cos(angle);
      y=cy+r*Math.sin(angle)*0.7;
      tries++;
    }while(tries<300 && !fits(x,y,w,h,rad,placed,W,H));

    el.style.left=x+'px';
    el.style.top=y+'px';
    placed.push({x,y,w,h,rad});
  });
}

function fits(x,y,w,h,rad,placed,W,H){
  if(x-w/2<4||x+w/2>W-4||y-h/2<4||y+h/2>H-4) return false;
  for(const p of placed){
    if(Math.abs(x-p.x)<(w+p.w)/2+6 && Math.abs(y-p.y)<(h+p.h)/2+4) return false;
  }
  return true;
}

// ── 순위 ──
function buildRank(tokens){
  const counts=countWords(tokens).slice(0,20);
  const max=counts[0]?.[1]||1;
  const items=counts.map((w,i)=>{
    const theme=classifyWord(w[0]);
    const col=THEMES[theme]||THEMES['기타'];
    return `<div class="ri">
      <span class="rn">${i+1}</span>
      <div>
        <div class="rw">${w[0]} <span class="rc" style="background:${col.bg};color:${col.fg}">${theme}</span></div>
        <div class="bar-bg"><div class="bar-f" style="width:${Math.round(w[1]/max*100)}%;background:${col.bg}"></div></div>
      </div>
      <span class="rs">${w[1]}</span>
    </div>`;
  }).join('');
  return `<div class="p-label">전체 통합 · 언급 빈도 순위</div><div class="rank-box">${items}</div>`;
}

// ── 기관별 합본 ──
function buildGroupPanel(tokens, groupName, subTables){
  const wcHtml=buildWC(tokens, groupName+' 합본');
  const subCards=subTables.map(s=>{
    const sc=countWords(s.tokens).slice(0,8);
    const tags=sc.map((w,i)=>{
      const theme=classifyWord(w[0]);
      const col=THEMES[theme]||THEMES['기타'];
      return `<span class="sub-tag" style="background:${col.bg};color:${col.fg}">${w[0]}</span>`;
    }).join('');
    return `<div class="sub-card"><div class="sub-title">📋 ${s.name}</div><div class="sub-tags">${tags}</div></div>`;
  }).join('');
  return wcHtml+`<div class="sub-grid">${subCards}</div>`;
}


// ── 공통 키워드 ──
function buildCommon(groupMap, groups){
  if(groups.length < 2) return '<div class="p-label">기관이 2개 이상 있어야 비교할 수 있어요</div>';

  // 각 기관의 상위 키워드 set
  const groupSets = groups.map(g => {
    const counts = countWords(groupMap[g]);
    return { name: g, set: new Set(counts.slice(0,30).map(w=>w[0])), counts };
  });

  // 2개 이상 기관에서 나온 키워드
  const allWords = [...new Set(groupSets.flatMap(g=>[...g.set]))];
  const common = allWords.map(word => {
    const inGroups = groupSets.filter(g=>g.set.has(word)).map(g=>g.name);
    const totalCount = groupSets.reduce((sum,g)=>{
      const found = g.counts.find(c=>c[0]===word);
      return sum + (found ? found[1] : 0);
    }, 0);
    return { word, inGroups, count: inGroups.length, totalCount };
  }).filter(w=>w.count>=2).sort((a,b)=>b.count-a.count||b.totalCount-a.totalCount);

  // 전체 공통 (모든 기관)
  const allCommon = common.filter(w=>w.count===groups.length);
  // 절반 이상 공통
  const halfCommon = common.filter(w=>w.count>=Math.ceil(groups.length/2) && w.count<groups.length);
  // 2개 이상
  const partCommon = common.filter(w=>w.count>=2 && w.count<Math.ceil(groups.length/2));

  function renderCommonWords(words, label, accent){
    if(!words.length) return '';
    const tags = words.slice(0,20).map(w=>{
      const theme = classifyWord(w.word);
      const col = THEMES[theme]||THEMES['기타'];
      const size = 0.75 + (w.count/groups.length)*0.5;
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;margin:5px 8px">
        <span style="font-size:${size}rem;font-weight:900;color:${col.bg};padding:4px 10px;background:${col.bg}18;border-radius:8px;border:1.5px solid ${col.bg}40">${w.word}</span>
        <span style="font-size:.62rem;color:var(--muted);margin-top:3px">${w.inGroups.join('·')}</span>
      </div>`;
    }).join('');
    return `<div style="background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px 18px;margin-bottom:12px">
      <div style="font-size:.75rem;font-weight:700;color:${accent};margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid ${accent}30">
        ${label} <span style="font-size:.68rem;font-weight:400;color:var(--muted)">(${words.length}개)</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;align-items:flex-end">${tags}</div>
    </div>`;
  }

  return `<div class="p-label">2개 이상 기관에서 공통으로 언급된 키워드 — 핵심 의제를 나타냅니다</div>
    ${renderCommonWords(allCommon, '🔴 모든 기관 공통', '#C9A84C')}
    ${renderCommonWords(halfCommon, '🟡 과반 기관 공통', '#4A8C5C')}
    ${renderCommonWords(partCommon, '🟢 일부 기관 공통', '#8FBF9A')}`;
}

// ── 레이더 차트 ──
function buildRadar(groupMap, groups){
  const themes = Object.keys(THEMES).filter(t=>t!=='기타');
  const themeColors = Object.values(THEMES).filter((_,i)=>i<themes.length);

  // 각 기관별 주제 점수
  const groupScores = groups.map(g=>{
    const counts = countWords(groupMap[g]);
    const total = counts.reduce((s,w)=>s+w[1],0)||1;
    const scores = themes.map(theme=>{
      const keywords = THEME_MAP[theme]||[];
      const score = counts.filter(w=>keywords.some(k=>w[0].includes(k))).reduce((s,w)=>s+w[1],0);
      return Math.round(score/total*100);
    });
    return { name: g, scores };
  });

  const maxScore = Math.max(...groupScores.flatMap(g=>g.scores), 1);

  // SVG 레이더
  const W=340, H=320, cx=W/2, cy=H/2, r=120;
  const N=themes.length;
  const angleStep=Math.PI*2/N;

  function getPoint(i, val, maxV){
    const angle=i*angleStep - Math.PI/2;
    const dist=(val/maxV)*r;
    return [cx+dist*Math.cos(angle), cy+dist*Math.sin(angle)];
  }

  // 배경 그리드
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:320px">`;

  // 동심원
  [0.25,0.5,0.75,1].forEach(ratio=>{
    const pts=themes.map((_,i)=>getPoint(i,maxScore*ratio,maxScore));
    svg+=`<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="#D8E8DC" stroke-width="1"/>`;
  });

  // 축
  themes.forEach((_,i)=>{
    const [x,y]=getPoint(i,maxScore,maxScore);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#D8E8DC" stroke-width="1"/>`;
  });

  // 기관별 폴리곤
  const polyColors=['#1A3328','#C9A84C','#4A8C5C','#8FBF9A','#2D5A3D','#E8C96A'];
  groupScores.forEach((g,gi)=>{
    const pts=g.scores.map((s,i)=>getPoint(i,s,maxScore));
    const col=polyColors[gi%polyColors.length];
    svg+=`<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="${col}22" stroke="${col}" stroke-width="2" opacity="0.85"/>`;
    pts.forEach(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`);
  });

  // 레이블
  themes.forEach((t,i)=>{
    const [x,y]=getPoint(i,maxScore*1.18,maxScore);
    const anchor=x<cx-5?'end':x>cx+5?'start':'middle';
    svg+=`<text x="${x}" y="${y}" text-anchor="${anchor}" font-size="10" fill="#2D5A3D" font-family="Noto Sans KR,sans-serif" font-weight="700">${t}</text>`;
  });

  svg+=`</svg>`;

  // 범례
  const legend=groupScores.map((g,i)=>{
    const col=polyColors[i%polyColors.length];
    return `<div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted)">
      <div style="width:12px;height:3px;background:${col};border-radius:2px"></div>${g.name}
    </div>`;
  }).join('');

  // 점수 테이블
  const tableRows=themes.map((t,i)=>{
    const cells=groupScores.map(g=>`<td style="text-align:center;padding:5px 8px;font-size:.75rem;font-weight:700;color:var(--ink)">${g.scores[i]}</td>`).join('');
    const col=themeColors[i]||THEMES['기타'];
    return `<tr>
      <td style="padding:5px 10px;font-size:.72rem;font-weight:700">
        <span style="background:${col.bg};color:${col.fg};padding:1px 7px;border-radius:10px">${t}</span>
      </td>${cells}
    </tr>`;
  }).join('');

  const headerCells=groupScores.map(g=>`<th style="text-align:center;padding:5px 8px;font-size:.7rem;color:var(--muted);font-weight:700">${g.name}</th>`).join('');

  const result=`<div class="p-label">기관별 주제 분포 비교 · 숫자 = 전체 의견 중 해당 주제 비율(%)</div><div class="radar-inner">
    <div style="background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:12px">
      ${svg}
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px">${legend}</div>
    </div>
    <div style="background:#fff;border-radius:14px;border:1px solid var(--border);padding:14px;overflow-x:auto">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr><th style="text-align:left;padding:5px 10px;font-size:.7rem;color:var(--muted)">주제</th>${headerCells}</tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div></div>`;
  return result+`<div class="click-hint" onclick="openModal('기관별 비교 레이더 차트', document.querySelector('.radar-inner').innerHTML)">🔍 클릭해서 크게 보기</div>`;
}


function openModal(title, contentHtml){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').innerHTML = contentHtml;
  document.getElementById('modalOverlay').classList.add('on');
  document.body.style.overflow='hidden';
  // WC 재배치
  const canvas = document.getElementById('modalContent').querySelector('.wc-canvas');
  if(canvas){
    canvas.style.height='460px';
    setTimeout(()=>layoutWC(canvas),50);
  }
}
function closeModal(e){
  if(e.target===document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modalOverlay').classList.remove('on');
  document.body.style.overflow='';
}
// ESC 키로 닫기
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModalDirect()});

function goBack(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('inputScreen').style.display='flex';
}
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
function showErr(m){const b=document.getElementById('errBox');b.textContent=m;b.style.display='block'}
function hideErr(){document.getElementById('errBox').style.display='none'}
</script>
